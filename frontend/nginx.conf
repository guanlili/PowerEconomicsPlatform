server {
    listen 80;
    server_name localhost;

    # Root directory for the app
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # API reverse proxy to backend
    # 在 docker-compose 中通过服务名 `backend` 访问后端容器；
    # 如需在未使用 compose 的环境部署，可改回 host.docker.internal。
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # 根路径自动跳转到子路径，避免 React Router basename="/keti1" 与 URL 不匹配导致空白页
    # 使用 $scheme://$http_host 构造绝对 URL，防止反向代理场景下端口号丢失
    location = / {
        return 301 $scheme://$http_host/keti1/;
    }

    location /keti1/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /keti1/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
