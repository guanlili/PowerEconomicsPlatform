services:
  mysql:
    image: mysql:8.0
    container_name: power-economics-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: power_economics
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - power-economics-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: power-economics-platform-backend:v3.0
    container_name: power-economics-backend
    environment:
      # 容器内通过服务名 mysql 连接数据库
      DATABASE_URL: "mysql+pymysql://root:root123@mysql:3306/power_economics?charset=utf8mb4"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - power-economics-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: power-economics-platform-frontend:v3.0
    container_name: power-economics-platform-frontend
    ports:
      - "8094:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - power-economics-net

volumes:
  mysql_data:

networks:
  power-economics-net:
    driver: bridge
